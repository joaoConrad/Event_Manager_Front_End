<div class="card p-4 shadow-sm">
  <h3 class="mb-4">
    {{ isEdit ? 'Editar Evento' : 'Novo Evento' }}
  </h3>

  <form (ngSubmit)="saveEvent()">

    <div class="mb-3">
      <label class="form-label">Título</label>
      <input [(ngModel)]="event.title" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Descrição</label>
      <textarea [(ngModel)]="event.description" name="description" class="form-control"></textarea>
    </div>

    <div class="row">
      <div class="col">
        <label>Data</label>
        <input type="date" [(ngModel)]="event.date" name="date" class="form-control">
      </div>

      <div class="col">
        <label>Hora</label>
        <input type="time" [(ngModel)]="event.time" name="time" class="form-control">
      </div>
    </div>

    <div class="mt-3">
      <label>Local</label>
      <input [(ngModel)]="event.location" name="location" class="form-control">
    </div>

    <div class="mt-3">
      <label>Máx Participantes</label>
      <input type="number" [(ngModel)]="event.maxParticipants" name="maxParticipants" class="form-control">
    </div>

    <button class="btn btn-primary mt-4 w-100">
      Salvar Evento
    </button>

  </form>
</div>
