<p>event-detail works!</p>
<div *ngIf="event" class="container">
  <h2>{{ event.title }}</h2>

  <p>{{ event.description }}</p>
  <p>{{ event.date }} - {{ event.time }}</p>
  <p>{{ event.location }}</p>
  <p>Máx: {{ event.maxParticipants }}</p>

  <button [routerLink]="['/event', event.id, 'participants']" class="btn btn-primary">
    Participantes
  </button>

  <button [routerLink]="['/event', event.id, 'subscribe']" class="btn btn-success">
    Inscrever
  </button>
</div>
<div class="container mt-4">
  <div class="card shadow p-4">
    <h2>{{ event.title }}</h2>

    <p class="text-muted">{{ event.description }}</p>

    <p>
      📅 {{ event.date }} <br>
      ⏰ {{ event.time }} <br>
      📍 {{ event.location }}
    </p>

    <div class="mt-3">
      <button [routerLink]="['/event', event.id, 'participants']" class="btn btn-primary me-2">
        Participantes
      </button>

      <button [routerLink]="['/event', event.id, 'subscribe']" class="btn btn-success">
        Inscrever
      </button>
    </div>
  </div>
</div>
