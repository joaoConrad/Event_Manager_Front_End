<section class="auth-container">
  <div class="auth-card">
    <h1>Login</h1>

    <form>
      <label>Email</label>
      <input type="email" placeholder="Digite seu email" />

      <label>Senha</label>
      <input type="password" placeholder="Digite sua senha" />

      <button type="submit">Entrar</button>
    </form>

    <p class="auth-footer">
      Não tem conta?
      <a routerLink="/register">Cadastre-se</a>
    </p>
  </div>
</section>
